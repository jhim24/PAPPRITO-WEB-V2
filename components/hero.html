<section id="home" class="hero">

    <!-- ==========================================
         BACKGROUND VIDEO
    =========================================== -->

  <video
    class="hero-video"
    autoplay
    muted
    loop
    playsinline
    preload="auto">

        <source
            src="assets/videos/hero.mp4"
            type="video/mp4">

        Your browser does not support HTML5 video.

    </video>

    <!-- ==========================================
         DARK OVERLAY
    =========================================== -->

    <div class="hero-overlay"></div>

    <!-- ==========================================
         HERO CONTENT
    =========================================== -->

    <div class="container">

        <div class="hero-content">

            <span class="hero-subtitle">

                Welcome to PAPPRITO

            </span>

            <h1 class="hero-title">

                Authentic Filipino Cuisine

            </h1>

            <p class="hero-description">

                Enjoy authentic Filipino flavors made with quality ingredients,
                warm hospitality, and unforgettable dining experiences.

            </p>

            <div class="hero-buttons">

                <a
                    href="#menu"
                    class="btn-primary">

                    View Menu

                </a>

                <a
                    href="#reservation"
                    class="btn-outline">

                    Reserve Table

                </a>

            </div>

        </div>

    </div>

</section>
