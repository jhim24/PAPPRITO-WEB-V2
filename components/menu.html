<section id="menu" class="menu-section">

    <div class="container">

        <div class="section-header">

            <span class="section-subtitle">
                Our Menu
            </span>

            <h2 class="section-title">
                Discover Our Best Dishes
            </h2>

            <p class="section-description">
                Choose from our wide selection of authentic Filipino dishes,
                beverages, desserts, and family favorites.
            </p>

        </div>

        <!-- Search -->

        <div class="menu-search">

            <input
                type="text"
                id="menu-search"
                placeholder="Search menu...">

        </div>

        <!-- Categories -->

        <div class="menu-categories">

            <button class="category-btn active" data-category="all">All</button>

            <button class="category-btn" data-category="appetizer">Appetizers</button>

            <button class="category-btn" data-category="main">Main Course</button>

            <button class="category-btn" data-category="dessert">Desserts</button>

            <button class="category-btn" data-category="drinks">Drinks</button>

        </div>

        <!-- Dynamic Menu -->

        <div id="menu-grid" class="menu-grid">

            <!-- Products will be loaded here -->

        </div>

    </div>

</section>
