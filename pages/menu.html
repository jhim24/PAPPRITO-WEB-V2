<!DOCTYPE html>

<!-- ==========================================================
     PAPPRITO WEB V3
     File        : menu.html
     Description : Restaurant Menu
     Version     : 3.0.0
========================================================== -->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Our Menu | PAPPRITO Restaurant</title>

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <!-- Menu CSS -->

    <link rel="stylesheet"
          href="../assets/css/menu.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header id="header"></header>

<main>

    <!-- ==============================================
         MENU HERO
    =============================================== -->

   <section id="menu-hero">

    <div class="menu-hero-content">

        <span>Authentic Filipino Cuisine</span>

        <h1>Our Menu</h1>

        <p>

            Discover our signature dishes, family favorites,
            and freshly prepared meals made with quality
            ingredients and served with Filipino hospitality.

        </p>

    </div>

</section>

    <!-- ==============================================
         MENU CATEGORY
    =============================================== -->

   <section id="menu-category">

    <div class="container">

        <div class="menu-category-wrapper">

            <button class="category-btn active"
                    data-category="all">
                All
            </button>

            <button class="category-btn"
                    data-category="appetizers">
                Appetizers
            </button>

            <button class="category-btn"
                    data-category="rice-meals">
                Rice Meals
            </button>

            <button class="category-btn"
                    data-category="noodles">
                Noodles
            </button>

            <button class="category-btn"
                    data-category="desserts">
                Desserts
            </button>

            <button class="category-btn"
                    data-category="beverages">
                Beverages
            </button>

            <button class="category-btn"
                    data-category="specials">
                Specials
            </button>

        </div>

    </div>

</section>

    <!-- ==============================================
         MENU ITEMS
    =============================================== -->

    <section id="menu-items">

    </section>

</main>

<footer id="footer"></footer>

<script src="../assets/js/menu.js"></script>

</body>

</html>
