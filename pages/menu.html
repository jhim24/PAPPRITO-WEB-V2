<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Our Menu | PAPPRITO Restaurant</title>

    <link rel="stylesheet"

 <section id="menu-category">

</section>

=============================================== -->

<section id="menu-items">

    <div class="container">

        <div

    </div>

</section>
